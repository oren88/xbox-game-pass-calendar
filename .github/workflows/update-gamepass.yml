name: Update Game Pass Calendar

on:
  schedule:
    - cron: '15 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-gamepass-calendar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Game Pass data
        run: npm run fetch:gamepass

      - name: Validate
        run: |
          npm run lint
          npm run build

      - name: Commit updated data
        run: |
          if git diff --quiet -- src/data/gamepass-events.json; then
            echo "No Game Pass data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/gamepass-events.json
          git commit -m "chore: update game pass calendar data"
          git push
